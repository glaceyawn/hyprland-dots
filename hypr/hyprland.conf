# Monitor Setup
# Second Monitor (Portrait): 1920x1080 @ 240Hz, rotated 90 degrees, positioned on the far left (0x0)
monitor=HDMI-A-5,1920x1080@240,0x0,1,transform,1

# Main Monitor: 3440x1440 @ 180Hz, positioned to the right of the portrait monitor
# Position calculation: HDMI-A-5 is 1080 pixels wide when rotated, so DP-5 starts at 1080x0
monitor=DP-5,3440x1440@180,1080x0,1

# Input Config
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = -1.0 # -1.0 - 1.0, 0 means no modification.
}

# General Aesthetics
general {
    gaps_in = 6
    gaps_out = 6
    border_size = 0       # FIXED: Set to 0 to completely remove all window borders
    layout = dwindle
}

# Decoration (Transparency & Blur)
decoration {
    rounding = 0 # Changed to 0 for sharp, boxed corners
    
    # Active windows are slightly transparent, inactive windows fade more
    active_opacity = 0.99
    inactive_opacity = 0.93
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = 3
        passes = 3
        new_optimizations = true
        ignore_opacity = true # Keeps the blur beautiful behind transparent windows
    }
}

# Animations (Snappy yet smooth)
animations {
    enabled = true
    bezier = myBezier, 0.05, 0.9, 0.1, 1.05
    animation = windows, 1, 5, myBezier
    animation = border, 1, 10, default
    animation = fade, 1, 5, default
    animation = workspaces, 1, 5, default
}

# Layouts
dwindle {
    preserve_split = true
}

# Keybinds
$mainMod = SUPER

# Core Apps
bind = $mainMod, T, exec, kitty
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, V, togglefloating,
bind = $mainMod, D, exec, rofi -show drun
# Your Custom Requested Binds
bind = $mainMod, B, exec, helium-browser
bind = $mainMod, E, exec, dolphin

# Focus movement using Arrow Keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Window movement using Arrow Keys (Super + Shift + Arrow)
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d

# Workspace Switching (Super + 1-9)
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

# Move active window to workspace (Super + Shift + 1-5)
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

# Screenshot of a selected region (Super + Shift + S)
bind = SUPER SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy && wl-paste > ~/Pictures/Screenshots/Screenshot-$(date +%F_%T).png && dunstify "Screenshot taken" "Region saved to clipboard and Pictures" -t 2000

# Screenshot of the whole screen (Super + Print Screen)
bind = SUPER SHIFT, Print, exec, grim - | wl-copy && wl-paste > ~/Pictures/Screenshots/Screenshot-$(date +%F_%T).png && dunstify "Screenshot taken" "Whole screen saved to clipboard and Pictures" -t 2000

bind = $mainMod, F, exec, hyprctl dispatch fullscreen 1

bind = $mainMod, W, exec, waybar
bind = $mainMod SHIFT, W, exec, killall waybar
bind = $mainMod SHIFT, T, exec, hyprpaper
bind = $mainMod, H, exec, /home/niko/.config/hypr/scripts/keybinds.sh

# Mouse Binds (Move and Resize Floating Windows)
# bindm uses Hyprland's mouse bind system (mouse:272 is Left Click, mouse:273 is Right Click)
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Autostart essential apps
exec-once = waybar
exec-once = rofi -show drun
exec-once = hyprpaper

env = HYPRCURSOR_THEME,your-cursor-theme
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME,your-cursor-theme
env = XCURSOR_SIZE,24

windowrule {
    name = waybar-float-rule
    match:class = ^(waybar)$
    float = on
}
