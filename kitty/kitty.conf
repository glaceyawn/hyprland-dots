# --- Fonts ---
font_family      FiraCode Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

# --- Window Layout & Transparency ---
# Increased opacity to 0.80 so it's a solid, dark black tint with just a hint of wallpaper
background_opacity 0.88
dynamic_background_opacity yes
window_padding_width 12
hide_window_decorations no

# --- Color Scheme (Transparent Black Backdrop with High Visibility Light Pastels) ---

# Pure deep black backdrop (perfect for maximum transparency contrast)
background            #000000
# FIXED: Changed from dark slate to a bright pastel off-white for perfect visibility
foreground            #f4eedb
# High-contrast selection highlight for light text
selection_background  #443c4d
selection_foreground  #f4eedb

# Cursor (Soft pastel lavender-blue glow)
cursor                #9bb8ff
cursor_text_color     #000000

# Tab bar styling
active_tab_foreground   #000000
active_tab_background   #6292ed
inactive_tab_foreground #9c8e9f
inactive_tab_background #1a1a1a

# The 16 terminal colors (Bright, clean light pastels)

# Black / Grey (Slightly adjusted for dark background visibility)
color0 #2d2536
color8 #6b7c96

# Red (Soft Pastel Coral/Rose)
color1 #ffb3b3
color9 #ffd1d1

# Green (Soft Sage Mint)
color2 #bbf2d1
color10 #d4fadc

# Yellow (Soft Banana/Chalk Cream)
color3 #fef1bc
color11 #fff9e6

# Blue (Rich Pastel Blue)
color4 #9bc2ff
color12 #c1daff

# Magenta (Soft Lavender/Lilac)
color5 #e1ccff
color13 #f0e6ff

# Cyan (Soft Ice Blue/Teal)
color6 #b2ebf2
color14 #d4f5f8

# White / Light Grey
color7 #f5f9fc
color15 #ffffff
